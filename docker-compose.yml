version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./data:/app/data
    environment:
      - DEBUG=True
      - DATABASE_URL=sqlite:///./data/insightiq.db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - db

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./src/frontend:/app/src
      - ./src/shared:/app/src/shared
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=insightiq
      - POSTGRES_PASSWORD=insightiq123
      - POSTGRES_DB=insightiq
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data: